name: github pages
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@master

    - name: Build and Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@master
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        branch: gh-pages
        folder: public
        BUILD_SCRIPT: npm install && npm run build
        clean: true
        clean-exclude: |
              CNAME
              README.md
