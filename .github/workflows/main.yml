name: github pages
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@master

    - name: Install and Build 🔧
      run: |
        npm install
        npm run build

    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@master
      with:
        branch: gh-pages
        folder: public
        token: ${{ secrets.ACCESS_TOKEN }}
        clean: true
        clean-exclude: |
              CNAME
              README.md
