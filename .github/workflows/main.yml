name: github pages
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@master

    - name: Install and Build 🔧
      run: |
        npm install
        npm run build
        cp CNAME public
        
    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@4.0.0
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        branch: gh-pages
        folder: public
