name: github pages
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@master

    - name: Build and Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@4.0.0
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        branch: gh-pages
        folder: public
        build_script: yarn install && yarn build
        clean: true
        clean-exclude: |
              CNAME
              README.md
